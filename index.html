<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for my love putri auliaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%); overflow-x: hidden; }
        .font-handwritten { font-family: 'Caveat', cursive; }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
        .heart-particle { position: absolute; bottom: -10px; pointer-events: none; animation: float linear infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <audio id="bgMusic" loop><source src="jatuhsuka.mp3" type="audio/mpeg"></audio>

    <button id="musicBtn" class="absolute top-4 right-4 bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-lg text-pink-600 hover:scale-110 active:scale-95 transition-all duration-300 z-50">
        <i id="musicIcon" class="fa-solid fa-music"></i>
    </button>

    <main id="mainCard" class="bg-white/85 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-md w-full text-center border border-white/50 relative z-10 transition-all duration-500 transform hover:scale-[1.02]">
        
        <div class="flex justify-center mb-6">
            <div class="w-48 h-48 rounded-2xl overflow-hidden shadow-inner bg-pink-100 flex items-center justify-center relative">
                <!-- GIF Beruang Lucu -->
                <img id="displayGif" src="https://media.tenor.com/y4_9676v4gAAAAAi/cute-bear.gif" alt="Cute Bear" class="object-cover w-full h-full transition-all duration-300">
            </div>
        </div>

        <div id="interactionSection">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2 leading-tight">Helooo Kesayangan Akuuu</h1>
            <p class="text-gray-600 mb-8 text-sm md:text-base">Hows ur day sayangg?</p>

            <div class="flex flex-row items-center justify-center gap-4 min-h-[60px] relative" id="btnContainer">
                <button id="yesBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-8 py-3 rounded-full shadow-lg hover:shadow-pink-300/50 transform active:scale-95 transition-all duration-300 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-heart"></i> Baiikkk!
                </button>
                <button id="noBtn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold px-8 py-3 rounded-full shadow-lg transform transition-all duration-300 text-lg absolute md:static">
                    So bad bebee :(
                </button>
            </div>
        </div>

        <div id="successSection" class="hidden animate-fade-in">
            <h1 class="text-4xl md:text-5xl font-handwritten font-bold text-pink-600 mb-4">yeyyyyy</h1>
            <p class="text-gray-700 mb-6 text-sm md:text-base leading-relaxed">Mau gimanapun harimu, aku selalu bangga padamu ❤️</p>
            <button id="waBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-3 rounded-full shadow-lg hover:shadow-emerald-300/50 transform active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 mx-auto">
                <i class="fa-brands fa-whatsapp text-xl"></i> Kirim Love ke jeje
            </button>
        </div>
    </main>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainCard = document.getElementById('mainCard');
        const interactionSection = document.getElementById('interactionSection');
        const successSection = document.getElementById('successSection');
        const displayGif = document.getElementById('displayGif');
        const waBtn = document.getElementById('waBtn');
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicIcon = document.getElementById('musicIcon');

        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) { bgMusic.pause(); musicIcon.className = 'fa-solid fa-music-slash text-gray-500'; }
            else { bgMusic.play().catch(() => {}); musicIcon.className = 'fa-solid fa-music text-pink-600'; }
            isPlaying = !isPlaying;
        });

        function moveNoButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${Math.random() * maxX}px`;
            noBtn.style.top = `${Math.random() * maxY}px`;
            displayGif.src = "https://media.tenor.com/y4_9676v4gAAAAAi/cute-bear.gif";
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });

        yesBtn.addEventListener('click', () => {
            displayGif.src = "https://media.tenor.com/LY607v0ZidIAAAAi/yellow-bear-love-hug.gif";
            interactionSection.classList.add('hidden');
            successSection.classList.remove('hidden');
            // Heart storm
            setInterval(() => {
                const h = document.createElement('div'); h.className = 'heart-particle'; h.innerText = '❤️';
                h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(h); setTimeout(() => h.remove(), 5000);
            }, 200);
        });

        waBtn.addEventListener('click', () => {
            window.open(`https://api.whatsapp.com/send?phone=6281215926322&text=I%20LOVE%20YOU%20SO%20MUCH%20SAYANGG%20❤️`, '_blank');
        });
    </script>
</body>
</html>
