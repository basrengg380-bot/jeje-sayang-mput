<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%); overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .font-handwritten { font-family: 'Caveat', cursive; }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
        .heart-particle { position: absolute; bottom: -10px; pointer-events: none; animation: float linear infinite; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 relative">

    <audio id="bgMusic" loop>
        <source src="jatuhsuka.mp3" type="audio/mpeg">
    </audio>

    <button id="musicBtn" class="absolute top-4 right-4 bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-lg text-pink-600 z-50">
        <i id="musicIcon" class="fa-solid fa-music"></i>
    </button>

    <main id="mainCard" class="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-md w-full text-center border border-white relative z-10 transition-all duration-500">
        
        <div class="flex justify-center mb-6">
            <div class="w-48 h-48 rounded-2xl overflow-hidden shadow-inner bg-pink-100 flex items-center justify-center relative">
                <!-- GIF Beruang Lucu -->
                <img id="displayGif" src="https://media.tenor.com/y4_9676v4gAAAAAi/cute-bear.gif" alt="Cute Bear" class="object-cover w-full h-full">
            </div>
        </div>

        <div id="interactionSection">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Helooo Kesayangan Akuuu</h1>
            <p class="text-gray-600 mb-8">Hows ur day sayangg?</p>

            <div class="flex flex-col md:flex-row items-center justify-center gap-4" id="btnContainer">
                <button id="yesBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-8 py-3 rounded-full shadow-lg active:scale-95 transition-all">
                    Baiikkk! ❤️
                </button>
                <button id="noBtn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold px-8 py-3 rounded-full shadow-lg transition-all">
                    So bad bebee :(
                </button>
            </div>
        </div>

        <div id="successSection" class="hidden">
            <h1 class="text-4xl font-handwritten font-bold text-pink-600 mb-4">yeyyyyy</h1>
            <p class="text-gray-700 mb-6">Mau gimanapun harimu, aku selalu bangga padamu ❤️</p>
            <button id="waBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-3 rounded-full shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto">
                <i class="fa-brands fa-whatsapp text-xl"></i> Kirim Love ke jeje
            </button>
        </div>
    </main>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const interactionSection = document.getElementById('interactionSection');
        const successSection = document.getElementById('successSection');
        const displayGif = document.getElementById('displayGif');
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');

        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) { bgMusic.play(); } else { bgMusic.pause(); }
        });

        // Efek tombol no lari-lari
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            displayGif.src = "https://media.tenor.com/7-8gK0n7qA8AAAAi/bear-sad.gif";
        });

        yesBtn.addEventListener('click', () => {
            displayGif.src = "https://media.tenor.com/LY607v0ZidIAAAAi/yellow-bear-love-hug.gif";
            interactionSection.classList.add('hidden');
            successSection.classList.remove('hidden');
            // Efek hati
            setInterval(() => {
                const h = document.createElement('div'); h.className = 'heart-particle'; h.innerText = '❤️';
                h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(h); setTimeout(() => h.remove(), 5000);
            }, 150);
        });

        document.getElementById('waBtn').addEventListener('click', () => {
            window.open('https://api.whatsapp.com/send?phone=6281215926322&text=I%20LOVE%20YOU%20SO%20MUCH%20SAYANGG%20❤️', '_blank');
        });
    </script>
</body>
</html>
